<!DOCTYPE html>
<html>

<head>

    <title>AI Bulk Mailer</title>

    <style>

        body{
            background:#f4f4f4;
            font-family:Arial;
            padding:40px;
        }

        .box{
            background:white;
            width:500px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:black;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#333;
        }

        .message{
            color:green;
            text-align:center;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>AI Bulk Mailer</h1>

    {% if message %}
        <div class="message">
            {{message}}
        </div>
    {% endif %}

    <form method="POST">

        <label>Email Subject</label>

        <input
        type="text"
        name="subject"
        placeholder="Enter Subject"
        required
        >

        <label>Email Body</label>

        <textarea
        name="body"
        rows="10"
        placeholder="Write Email Here..."
        required
        ></textarea>

        <button type="submit">
            Send Emails
        </button>

    </form>

</div>

</body>
</html>

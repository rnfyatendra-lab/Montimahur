<!DOCTYPE html>
<html>
<head>

<title>Fast Mail Launcher</title>

<style>

body{
background:#f2f5f9;
font-family:Arial;
}

.box{
width:80%;
margin:auto;
margin-top:40px;
background:white;
padding:40px;
border-radius:20px;
}

h1{
text-align:center;
}

.row{
display:flex;
gap:20px;
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:20px;
border-radius:15px;
border:1px solid #ccc;
font-size:20px;
}

textarea{
height:200px;
resize:none;
}

button{
width:100%;
padding:20px;
font-size:30px;
border:none;
border-radius:15px;
background:#4285f4;
color:white;
cursor:pointer;
}

.logout{
width:180px;
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#222;
color:white;
padding:20px;
border-radius:10px;
z-index:9999;
}

.okbtn{
margin-top:10px;
padding:10px 20px;
background:#4285f4;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="box">

<h1>📧 Fast Mail Launcher</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="popup" id="popup">

{{ messages[0] }}

<br>

<button class="okbtn" onclick="closePopup()">OK</button>

</div>

{% endif %}
{% endwith %}

<form method="POST">

<div class="row">

<input
type="text"
name="sender_name"
placeholder="Sender Name"
value="{{ data.sender_name }}"
required
>

<input
type="email"
name="gmail"
placeholder="Your Gmail"
value="{{ data.gmail }}"
required
>

</div>

<div class="row">

<input
type="password"
name="app_password"
placeholder="App Password"
value="{{ data.app_password }}"
required
>

<input
type="text"
name="subject"
placeholder="Subject"
value="{{ data.subject }}"
required
>

</div>

<div class="row">

<textarea
name="body"
placeholder="Message Body"
required
>{{ data.body }}</textarea>

<textarea
name="recipients"
placeholder="Recipients"
required
>{{ data.recipients }}</textarea>

</div>

<div class="row">

<button id="sendbtn" type="submit">

Send All

</button>

<a href="/logout">

<button
type="button"
class="logout"
ondblclick="window.location='/logout'"
>

Logout

</button>

</a>

</div>

</form>

</div>

<script>

const form = document.querySelector("form");
const btn = document.getElementById("sendbtn");

form.addEventListener("submit", function(){

btn.innerText = "Sending...";
btn.disabled = true;

});

function closePopup(){

document.getElementById("popup").style.display = "none";

}

</script>

</body>
</html>

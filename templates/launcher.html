<!DOCTYPE html>
<html>

<head>

<title>Fast Mail Launcher</title>

<style>

body{
    margin:0;
    padding:0;
    background:#edf0f5;
    font-family:Arial;
}

.container{
    width:1200px;
    background:white;
    margin:auto;
    margin-top:60px;
    border-radius:20px;
    padding:40px;
}

.top{
    text-align:center;
    margin-bottom:30px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

input, textarea{
    flex:1;
    padding:18px;
    border:1px solid #dcdcdc;
    border-radius:15px;
    font-size:18px;
}

textarea{
    height:180px;
    resize:none;
}

.bottom{
    display:flex;
    gap:20px;
    align-items:center;
}

.send{
    flex:1;
}

.send button{
    width:100%;
    padding:20px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:15px;
    font-size:28px;
    cursor:pointer;
}

.send button:hover{
    background:#2563eb;
}

.logout button{
    padding:20px 30px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
}

.message{
    text-align:center;
    color:green;
    font-size:20px;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="top">

<h1>📧 Fast Mail Launcher</h1>

</div>

{% if message %}

<div class="message">

{{message}}

</div>

{% endif %}

<form method="POST">

<div class="row">

<input
type="text"
name="sender_name"
placeholder="Sender Name"
required
>

<input
type="email"
name="gmail"
placeholder="Your Gmail"
required
>

</div>

<div class="row">

<input
type="password"
name="app_password"
placeholder="App Password"
required
>

<input
type="text"
name="subject"
placeholder="Subject"
required
>

</div>

<div class="row">

<textarea
name="body"
placeholder="Message Body"
required
></textarea>

<textarea
name="recipients"
placeholder="Recipients (comma or newline)"
required
></textarea>

</div>

<div class="bottom">

<div class="send">

<button type="submit">

Send All

</button>

</div>

<div class="logout">

<a href="/logout">

<button type="button">

Logout

</button>

</a>

</div>

</div>

</form>

</div>

</body>
</html>

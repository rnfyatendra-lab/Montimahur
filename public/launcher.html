<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mailer — Smart Inbox Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#eef0ff;font-family:'Inter',sans-serif;color:#1a1a2e;padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;background:#fff;padding:14px 22px;border-radius:14px;box-shadow:0 2px 12px rgba(102,126,234,0.1)}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:#1a1a2e}
.logo span{color:#667eea}
.logout-btn{padding:8px 18px;background:#fff;border:2px solid #dde1ff;border-radius:8px;color:#555;font-weight:600;cursor:pointer;transition:all 0.2s}
.logout-btn:hover{border-color:#e53e3e;color:#e53e3e}
.status-bar{display:flex;align-items:center;gap:12px;padding:13px 20px;background:#fff;border:2px solid #dde1ff;border-radius:12px;margin-bottom:22px;transition:all 0.3s}
.status-bar.success{border-color:#9ae6b4;background:#f0fff4}
.status-bar.error{border-color:#ffcccc;background:#fff5f5}
.status-bar.sending{border-color:#c3d1ff;background:#f5f6ff}
.status-icon{font-size:20px}
.status-text{font-size:14px;font-weight:600;color:#333}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  background: #fff;
  border: 2px solid #dde1ff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 10px rgba(102,126,234,0.07);
  margin-bottom: 20px;
}
.field{margin-bottom:5px}
.field label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:7px}
.field input,.field textarea{width:100%;padding:12px 15px;background:#f5f6ff;border:2px solid #dde1ff;border-radius:10px;color:#1a1a2e;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:all 0.2s;resize:none}
.field input:focus,.field textarea:focus{border-color:#667eea;background:#fff;box-shadow:0 0 0 4px rgba(102,126,234,0.12)}
textarea#messageBody, textarea#recipients{min-height:180px;font-size:13px}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:46px}
.toggle-pass{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:#aaa;cursor:pointer;font-size:17px;padding:4px}
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.badge{font-size:11px;font-weight:700;padding:3px 12px;background:#667eea;color:#fff;border-radius:20px}

.opt-box {
  grid-column: span 2;
  background: #f7fafc;
  border: 1px dashed #cbd5e0;
  padding: 12px 16px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.opt-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.opt-box input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.opt-box label { font-size: 13px; font-weight: 600; color: #4a5568; cursor: pointer; }
.hint-text { font-size: 11px; color: #718096; margin-left: 28px; }

.progress-wrap{display:none;align-items:center;gap:14px;padding:14px 20px;background:#fff;border:2px solid #dde1ff;border-radius:12px;margin-bottom:20px}
.progress-bar{flex:1;height:8px;background:#eef0ff;border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;width:0%;transition:width 0.3s ease}
.progress-text{font-size:13px;font-weight:600;color:#667eea;white-space:nowrap}
.action-row{display:flex;gap:12px;margin-bottom:20px}
.send-btn{flex:1;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 28px rgba(102,126,234,0.4)}
.send-btn:disabled{opacity:0.6;cursor:not-allowed}
.clear-btn{padding:15px 22px;background:#fff;border:2px solid #dde1ff;border-radius:12px;color:#555;font-weight:600;cursor:pointer;transition:all 0.2s}
.clear-btn:hover{border-color:#e53e3e;color:#e53e3e}
.log-box{display:none;background:#fff;border:2px solid #dde1ff;border-radius:14px;overflow:hidden}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:2px solid #eef0ff;background:#f5f6ff}
.log-title{font-size:12px;font-weight:700;color:#667eea;text-transform:uppercase;letter-spacing:1px}
.log-clear{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;font-weight:600}
.log-clear:hover{color:#e53e3e}
.log-list{padding:12px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border-radius:8px;font-size:13px;font-weight:500}
.log-item.ok{background:#f0fff4;color:#276749}
.log-item.fail{background:#fff5f5;color:#e53e3e}
.log-item.info{background:#ebf4ff;color:#2b6cb0}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}.opt-box{grid-column:span 1}body{padding:14px}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📧 Fast<span>Mailer</span></div>
  <button class="logout-btn" id="logoutBtn">⎋ Logout</button>
</div>

<div class="status-bar" id="statusBar">
  <span class="status-icon" id="statusIcon">⚡</span>
  <span class="status-text" id="statusText">Ready to launch</span>
</div>

<div class="form-grid">
  <!-- रो 1 -->
  <div class="field">
    <label>Sender Name</label>
    <input id="senderName" type="text" placeholder="e.g. Rahul Sharma">
  </div>
  <div class="field">
    <label>Your Gmail</label>
    <input id="gmailId" type="email" placeholder="you@gmail.com">
  </div>

  <!-- रो 2 -->
  <div class="field">
    <label>App Password</label>
    <div class="pass-wrap">
      <input id="appPassword" type="password" placeholder="Google App Password">
      <button class="toggle-pass" onclick="togglePass()">👁</button>
    </div>
  </div>
  <div class="field">
    <label>Subject</label>
    <input id="subject" type="text" placeholder="Email subject line">
  </div>

  <!-- रो 3 -->
  <div class="field">
    <label>Message Body</label>
    <textarea id="messageBody" placeholder="Write content... Support Spintax like {Hello|Hi|Greetings} user!"></textarea>
  </div>
  <div class="field">
    <div class="rec-header">
      <label>Recipients (comma or newline)</label>
      <span class="badge" id="recipientCount">0 recipients</span>
    </div>
    <textarea id="recipients" placeholder="Paste emails here..." oninput="countRecipients()"></textarea>
  </div>

  <!-- इंटेलिजेंट इनबॉक्स ऑप्टिमाइज़र -->
  <div class="opt-box">
    <div class="opt-row">
      <input type="checkbox" id="randomizeSubject" checked>
      <label for="randomizeSubject">🛡️ विषय एंटी-स्पैम सुरक्षा (सब्जेक्ट ट्रैकिंग कोड सक्षम करें)</label>
    </div>
    <div class="opt-row">
      <input type="checkbox" id="spinContent" checked>
      <label for="spinContent">🌀 संदेश विविधता (कंटेंट स्पिनर सक्रिय करें)</label>
    </div>
    <span class="hint-text">सुझाव: अलग संदेश भेजने के लिए बॉडी में कर्ली ब्रैकेट का प्रयोग करें, जैसे: {प्रणाम|नमस्ते|हेलो}।</span>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">0 / 0</span>
</div>

<div class="action-row">
  <button class="send-btn" id="sendBtn" onclick="sendAll()">🚀 Send All Emails</button>
  <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>
</div>

<div class="log-box" id="logBox">
  <div class="log-header">
    <span class="log-title">📋 Send Log</span>
    <button class="log-clear" onclick="clearLog()">✕ Clear</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<script>
function parseEmails(raw){return raw.split(/[\n,]+/).map(e=>e.trim().toLowerCase()).filter(e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e))}
function countRecipients(){const e=parseEmails(document.getElementById('recipients').value),b=document.getElementById('recipientCount');b.textContent=`${e.length} recipient${e.length!==1?'s':''}`}
function togglePass(){const i=document.getElementById('appPassword');i.type=i.type==='password'?'text':'password'}
function setStatus(t,icon,text){const b=document.getElementById('statusBar');b.className='status-bar '+t;document.getElementById('statusIcon').textContent=icon;document.getElementById('statusText').textContent=text}
function addLog(t,icon,msg){const lb=document.getElementById('logBox'),ll=document.getElementById('logList');lb.style.display='block';const i=document.createElement('div');i.className=`log-item ${t}`;i.innerHTML=`<span>${icon}</span><span>${msg}</span>`;ll.appendChild(i);lb.scrollTop=lb.scrollHeight}
function clearLog(){document.getElementById('logList').innerHTML='';document.getElementById('logBox').style.display='none'}
function setProgress(cur,tot){const w=document.getElementById('progressWrap');w.style.display='flex';const pct=tot>0?Math.round(cur/tot*100):0;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=`Sending ${cur} / ${tot}`}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// टेक्स्ट से स्पिनटैक्स वेरिएशंस जनरेट करने का फंक्शन
function parseSpintax(text) {
  const matches = text.match(/\{[^{}]+\}/g);
  if (!matches) return text;
  for (let match of matches) {
    const choices = match.slice(1, -1).split('|');
    const randomChoice = choices[Math.floor(Math.random() * choices.length)];
    text = text.replace(match, randomChoice);
  }
  return parseSpintax(text);
}

function validate(){
  const fields=[{id:'senderName',label:'Sender Name'},{id:'gmailId',label:'Your Gmail'},{id:'appPassword',label:'App Password'},{id:'subject',label:'Subject'},{id:'messageBody',label:'Message Body'}];
  for(const f of fields){if(!document.getElementById(f.id).value.trim()){setStatus('error','❌',`${f.label} is required`);return false}}
  const emails=parseEmails(document.getElementById('recipients').value);
  if(emails.length===0){setStatus('error','❌','Add at least 1 valid recipient');return false}
  return emails;
}

async function sendAll(){
  const emails=validate();if(!emails)return;
  const senderName=document.getElementById('senderName').value.trim();
  const gmailId=document.getElementById('gmailId').value.trim();
  const appPassword=document.getElementById('appPassword').value.trim();
  const baseSubject=document.getElementById('subject').value.trim();
  const messageBody=document.getElementById('messageBody').value.trim();
  const useRandomSubject=document.getElementById('randomizeSubject').checked;
  const useSpinContent=document.getElementById('spinContent').checked;
  const btn=document.getElementById('sendBtn');
  
  btn.disabled=true; btn.innerHTML='⏳ Processing...';
  clearLog(); setStatus('sending','📤','Executing high-speed delivery...'); setProgress(0,emails.length);
  
  let ok=0, fail=0;

  // गति: पहले की तरह एक साथ 6 ईमेल
  for(let i=0; i<emails.length; i+=6){
    const chunk = emails.slice(i, i+6);
    
    const promises = chunk.map(async (email) => {
      // प्रत्येक ईमेल के लिए विशिष्ट सब्जेक्ट
      const finalSubject = useRandomSubject 
        ? `${baseSubject} [#${Math.floor(1000 + Math.random() * 9000)}]`
        : baseSubject;

      // प्रत्येक ईमेल के लिए संदेश का स्वरूप स्पिन करना
      const finalBody = useSpinContent ? parseSpintax(messageBody) : messageBody;

      try{
        const res=await fetch('/api/send-email',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({senderName,gmailId,appPassword,subject:finalSubject,messageBody:finalBody,to:email})
        });
        const d=await res.json();
        if(res.ok && d.success){ok++; addLog('ok','✅',`Delivered → ${email}`)}
        else{fail++; addLog('fail','❌',`Failed → ${email}`)}
      }catch{fail++; addLog('fail','❌',`Error → ${email}`)}
    });

    await Promise.all(promises);
    setProgress(Math.min(i + chunk.length, emails.length), emails.length);
    
    if(i + 6 < emails.length) {
      // गति बनाए रखने के लिए एक छोटा अनियत इंसानी ब्रेक (2 से 4 सेकंड)
      const delayTime = Math.floor(Math.random() * (4000 - 2000 + 1)) + 2000;
      await sleep(delayTime);
    }
  }

  if(fail===0){setStatus('success','🎉','Batch processed successfully!');addLog('ok','✅','All tasks completed')}
  else{setStatus('sending','⚠️',`${ok} completed, ${fail} skipped`);addLog('fail','❌','Review logs for details')}
  btn.disabled=false; btn.innerHTML='🚀 Send All Emails';
}

function clearAll(){
  ['senderName','gmailId','appPassword','subject','messageBody','recipients'].forEach(id=>document.getElementById(id).value='');
  countRecipients();clearLog();document.getElementById('progressWrap').style.display='none';setStatus('','⚡','Ready');
}
</script>
</body>
</html>

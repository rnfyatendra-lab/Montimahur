<!DOCTYPE html>
<html>

<head>

<title>Fast Mail Launcher</title>

<style>

body{
    margin:0;
    padding:0;
    background:#edf0f5;
    font-family:Arial;
}

.container{
    width:1200px;
    background:white;
    margin:auto;
    margin-top:40px;
    border-radius:20px;
    padding:40px;
}

.top{
    text-align:center;
    margin-bottom:30px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

input, textarea{
    flex:1;
    padding:18px;
    border:1px solid #dcdcdc;
    border-radius:15px;
    font-size:18px;
}

textarea{
    height:180px;
    resize:none;
}

.bottom{
    display:flex;
    gap:20px;
    align-items:center;
}

.send{
    flex:1;
}

.send button{
    width:100%;
    padding:20px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:15px;
    font-size:28px;
    cursor:pointer;
}

.send button:disabled{
    background:gray;
    cursor:not-allowed;
}

.logout button{
    padding:20px 30px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
}

.message{
    text-align:center;
    color:green;
    font-size:40px;
    margin-bottom:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="top">

<h1>📧 Fast Mail Launcher</h1>

</div>

{% if message %}

<div class="message">

{{message}}

</div>

{% endif %}

<form method="POST" id="mailForm">

<div class="row">

<input
type="text"
name="sender_name"
placeholder="Sender Name"
value="{{data.sender_name}}"
required
>

<input
type="email"
name="gmail"
placeholder="Your Gmail"
value="{{data.gmail}}"
required
>

</div>

<div class="row">

<input
type="password"
name="app_password"
placeholder="App Password"
value="{{data.app_password}}"
required
>

<input
type="text"
name="subject"
placeholder="Subject"
value="{{data.subject}}"
required
>

</div>

<div class="row">

<textarea
name="body"
placeholder="Message Body"
required
>{{data.body}}</textarea>

<textarea
name="recipients"
placeholder="Recipients (comma or newline)"
required
>{{data.recipients}}</textarea>

</div>

<div class="bottom">

<div class="send">

<button
type="submit"
id="sendBtn"
>

Send All

</button>

</div>

<div class="logout">

<button
type="button"
ondblclick="window.location.href='/logout'"
>

Logout

</button>

</div>

</div>

</form>

</div>

<script>

const form = document.getElementById("mailForm");
const sendBtn = document.getElementById("sendBtn");

form.addEventListener("submit", function(){

    sendBtn.disabled = true;

    sendBtn.innerText = "Sending";

});

</script>

</body>
</html>

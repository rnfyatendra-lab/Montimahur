<!DOCTYPE html>
<html>
<head>

<title>Safe Mail Launcher</title>

<style>

body{
background:#f2f5f9;
font-family:Arial;
margin:0;
padding:0;
overflow-x:hidden;
}

.box{
width:80%;
margin:auto;
margin-top:40px;
background:white;
padding:40px;
border-radius:20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.row{
display:flex;
gap:20px;
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:20px;
border-radius:15px;
border:1px solid #ccc;
font-size:20px;
outline:none;
box-sizing:border-box;
}

textarea{
height:220px;
resize:none;
}

button{
width:100%;
padding:20px;
font-size:30px;
border:none;
border-radius:15px;
background:#4285f4;
color:white;
cursor:pointer;
transition:0.3s;
}

button:disabled{
opacity:0.7;
cursor:not-allowed;
}

.logout{
width:180px;
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#222;
color:white;
padding:20px;
border-radius:15px;
z-index:9999;
min-width:120px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.okbtn{
margin-top:12px;
padding:10px 25px;
background:#4285f4;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

</style>

</head>
<body>

<div class="box">

<h1>📧 Fast Mail Launcher</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="popup" id="popup">

<div>{{ messages[0] }}</div>

<button class="okbtn" onclick="closePopup()">OK</button>

</div>

{% endif %}
{% endwith %}

<form method="POST" id="mailForm">

<div class="row">

<input
type="text"
name="sender_name"
placeholder="Sender Name"
value="{{ data.sender_name }}"
required
>

<input
type="email"
name="gmail"
placeholder="Your Gmail"
value="{{ data.gmail }}"
required
>

</div>

<div class="row">

<input
type="password"
name="app_password"
placeholder="App Password"
value="{{ data.app_password }}"
required
>

<input
type="text"
name="subject"
placeholder="Subject"
value="{{ data.subject }}"
required
>

</div>

<div class="row">

<textarea
name="body"
placeholder="Message Body"
required
>{{ data.body }}</textarea>

<textarea
name="recipients"
placeholder="Recipients"
required
>{{ data.recipients }}</textarea>

</div>

<div class="row">

<button id="sendbtn" type="submit">

Send All

</button>

<button
type="button"
class="logout"
ondblclick="window.location='/logout'"
>

Logout

</button>

</div>

</form>

</div>

<script>

const form = document.getElementById("mailForm");

const sendbtn = document.getElementById("sendbtn");

let sending = false;

form.addEventListener("submit", function(){

if(sending){
event.preventDefault();
return;
}

sending = true;

sendbtn.innerText = "Sending...";
sendbtn.disabled = true;

});

function closePopup(){

document.getElementById("popup").style.display = "none";

}

</script>

</body>
</html>

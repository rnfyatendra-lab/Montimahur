<!DOCTYPE html>
<html>
<head>
    <title>AI Bulk Mailer</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:40px;
        }

        .box{
            background:white;
            padding:20px;
            width:500px;
            margin:auto;
            border-radius:10px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            padding:10px 20px;
            background:black;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="box">

<h1>AI Bulk Mailer</h1>

<p>{{message}}</p>

<form method="POST">

<input
type="text"
name="subject"
placeholder="Subject"
required
>

<textarea
name="body"
rows="10"
placeholder="Write Email"
required
></textarea>

<button type="submit">
Send Emails
</button>

</form>

</div>

</body>
</html>

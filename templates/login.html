<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
    margin:0;
    padding:0;
    background:#edf0f5;
    font-family:Arial;
}

.box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:15px;
    margin:auto;
    margin-top:120px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

</style>

</head>

<body>

<div class="box">

<h1>Fast Mail Login</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Login ID"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

</form>

</div>

</body>
</html>
